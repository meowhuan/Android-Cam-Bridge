name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.4). For tag trigger, this is ignored."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-2022
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout OBS Studio source
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: 32.0.4
          path: .tmp-obs-studio
          fetch-depth: 0
          submodules: recursive
      - name: Cache OBS SDK build
        uses: actions/cache@v4
        with:
          path: .tmp-obs-studio/build_x64
          key: ${{ runner.os }}-obs-sdk-32.0.4-x64-v1
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } elseif ("${{ github.event.inputs.version }}") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            throw "No version provided. Use workflow input 'version' when triggering manually."
          }
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release version: $v"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build OBS SDK (official script)
        shell: pwsh
        run: |
          $obsLibCached = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -File -Filter "obs.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $obsLibCached) {
            $env:CI = "true"
            pwsh -NoProfile -ExecutionPolicy Bypass -File .tmp-obs-studio/.github/scripts/Build-Windows.ps1 -Target x64 -Configuration Release
          } else {
            Write-Host "Using cached OBS SDK: $($obsLibCached.FullName)"
          }

          $obsInclude = (Resolve-Path ".tmp-obs-studio/libobs").Path
          $obsConfigHeader = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -Filter "obsconfig.h" | Select-Object -First 1
          $obsLib = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -File | Where-Object {
            $_.Name -eq "obs.lib" -and $_.FullName -notmatch "\\CMakeFiles\\"
          } | Select-Object -First 1

          if (-not $obsConfigHeader) { throw "obsconfig.h not found under .tmp-obs-studio/build_x64" }
          if (-not $obsLib) {
            Write-Host "Available .lib files under .tmp-obs-studio/build_x64:"
            Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -Filter "*.lib" | Select-Object -First 100 -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
            throw "obs.lib not found under .tmp-obs-studio/build_x64"
          }

          $obsGenerated = $obsConfigHeader.Directory.FullName
          $obsLibDir = $obsLib.Directory.FullName

          Write-Host "OBS include: $obsInclude"
          Write-Host "OBS generated include: $obsGenerated"
          Write-Host "OBS lib: $($obsLib.FullName)"

          "OBS_INCLUDE_DIR=$obsInclude" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBS_GENERATED_INCLUDE_DIR=$obsGenerated" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBS_LIB_DIR=$obsLibDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build native targets
        shell: pwsh
        run: ./scripts/build.ps1 -Config Release -ObsIncludeDir "$env:OBS_INCLUDE_DIR" -ObsGeneratedIncludeDir "$env:OBS_GENERATED_INCLUDE_DIR" -ObsLibDir "$env:OBS_LIB_DIR"

      - name: Prepare Android signing keystore
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $hasSigning = -not [string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_BASE64) `
            -and -not [string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_PASSWORD) `
            -and -not [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_ALIAS) `
            -and -not [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_PASSWORD)
          if (-not $hasSigning) {
            Write-Host "Android release signing disabled: missing one or more ANDROID_* secrets."
            return
          }

          $keystorePath = (Resolve-Path ".\android").Path + "\acb-release.jks"
          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))

          "ACB_UPLOAD_STORE_FILE=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ACB_UPLOAD_STORE_PASSWORD=$env:ANDROID_KEYSTORE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ACB_UPLOAD_KEY_ALIAS=$env:ANDROID_KEY_ALIAS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ACB_UPLOAD_KEY_PASSWORD=$env:ANDROID_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Android signing keystore prepared."

      - name: Build Android release APK
        shell: pwsh
        working-directory: ./android
        run: |
          $args = @(
            ":app:assembleRelease",
            "--no-daemon",
            "-PACB_VERSION_NAME=${{ steps.version.outputs.value }}",
            "-PACB_VERSION_CODE=${{ github.run_number }}"
          )
          gradle @args

      - name: Build installer (require real OBS plugin)
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version "${{ steps.version.outputs.value }}" -ObsIncludeDir "$env:OBS_INCLUDE_DIR" -ObsGeneratedIncludeDir "$env:OBS_GENERATED_INCLUDE_DIR" -ObsLibDir "$env:OBS_LIB_DIR" -RequireRealObsPlugin $true


      - name: Validate release payload
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $required = @(
            "dist/acb-win-x64/package.json",
            "dist/acb-win-x64/receiver/acb-receiver.exe",
            "dist/acb-win-x64/virtualcam-bridge/acb-virtualcam-bridge.exe",
            "dist/acb-win-x64/virtualcam-driver/acb-virtualcam.dll",
            "dist/acb-win-x64/drivers/aoa-winusb/acb-aoa.inf",
            "dist/acb-win-x64/drivers/aoa-winusb/install-driver.ps1",
            "dist/acb-win-x64/prereqs/vc_redist.x64.exe",
            "dist/installer/ACB-Setup-$version.exe"
          )
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              Write-Host "Missing release item: $item"
              if (Test-Path "dist") {
                Get-ChildItem "dist" -Recurse | Select-Object -First 300 FullName | ForEach-Object { Write-Host "  $($_.FullName)" }
              }
              throw "Release payload validation failed."
            }
          }
      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/release-assets -Force | Out-Null
          $version = "${{ steps.version.outputs.value }}"
          $zipPath = "dist/release-assets/ACB-win-x64-$version.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/acb-win-x64/*" -DestinationPath $zipPath -CompressionLevel Optimal

          Copy-Item "dist/installer/ACB-Setup-$version.exe" "dist/release-assets/ACB-Setup-$version.exe" -Force

          $apkCandidates = Get-ChildItem -Path "android/app/build/outputs/apk/release" -Filter "*.apk" -ErrorAction Stop
          $apk = $apkCandidates | Select-Object -First 1
          Copy-Item $apk.FullName "dist/release-assets/ACB-Android-$version.apk" -Force

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem "dist/release-assets" -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Out-File -FilePath "dist/release-assets/SHA256SUMS.txt" -Encoding utf8 -Append
          }

      - name: Check GPG secrets
        id: gpg_check
        shell: pwsh
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          $hasKey = -not [string]::IsNullOrWhiteSpace($env:GPG_PRIVATE_KEY) -or -not [string]::IsNullOrWhiteSpace($env:GPG_PRIVATE_KEY_B64)
          $enabled = $hasKey -and -not [string]::IsNullOrWhiteSpace($env:GPG_PASSPHRASE)
          if ($enabled) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "GPG signing enabled."
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "GPG signing skipped: missing secrets."
          }

      - name: Import GPG private key
        id: gpg
        if: steps.gpg_check.outputs.enabled == 'true'
        shell: pwsh
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
        run: |
          $keyFile = Join-Path $env:RUNNER_TEMP "acb-signing.key.asc"

          if (-not [string]::IsNullOrWhiteSpace($env:GPG_PRIVATE_KEY_B64)) {
            $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:GPG_PRIVATE_KEY_B64))
            Set-Content -Path $keyFile -Value $decoded -Encoding utf8
          } else {
            Set-Content -Path $keyFile -Value $env:GPG_PRIVATE_KEY -Encoding utf8
          }

          gpg --batch --import $keyFile

          $secretKeyLines = gpg --batch --list-secret-keys --with-colons
          $fprLine = $secretKeyLines | Where-Object { $_ -like "fpr:*" } | Select-Object -First 1
          if (-not $fprLine) {
            Write-Host "No secret key found after import. Public keys currently available:"
            gpg --batch --list-keys --with-colons | Where-Object { $_ -like "pub:*" -or $_ -like "fpr:*" -or $_ -like "uid:*" } | ForEach-Object { Write-Host $_ }
            throw "No GPG secret key fingerprint found. Ensure GPG_PRIVATE_KEY contains a full armored private key block (-----BEGIN PGP PRIVATE KEY BLOCK-----)."
          }
          $parts = $fprLine -split ':'
          if ($parts.Length -lt 10 -or [string]::IsNullOrWhiteSpace($parts[9])) {
            throw "Unable to parse GPG secret key fingerprint from: $fprLine"
          }
          $fpr = $parts[9]
          "fingerprint=$fpr" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Imported GPG key fingerprint: $fpr"

      - name: Sign release assets with GPG
        if: steps.gpg.outputs.fingerprint != ''
        shell: pwsh
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_FPR: ${{ steps.gpg.outputs.fingerprint }}
        run: |
          Get-ChildItem "dist/release-assets" -File | ForEach-Object {
            $asc = "$($_.FullName).asc"
            if (Test-Path $asc) { Remove-Item $asc -Force }
            gpg --batch --yes --pinentry-mode loopback --passphrase "$env:GPG_PASSPHRASE" --local-user "$env:GPG_FPR" --armor --detach-sign "$($_.FullName)"
          }

      - name: Upload release artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: acb-release-${{ steps.version.outputs.value }}
          path: dist/release-assets/**
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: ACB v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/release-assets/ACB-Setup-${{ steps.version.outputs.value }}.exe
            dist/release-assets/ACB-win-x64-${{ steps.version.outputs.value }}.zip
            dist/release-assets/ACB-Android-${{ steps.version.outputs.value }}.apk
            dist/release-assets/SHA256SUMS.txt
            dist/release-assets/*.asc





