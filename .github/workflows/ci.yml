name: ci

on:
  push:
    branches: ["main", "master", "develop", "dev", "dev/**", "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-2022
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout OBS Studio source
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: 32.0.4
          path: .tmp-obs-studio
          fetch-depth: 0
          submodules: recursive
      - name: Cache OBS SDK build
        uses: actions/cache@v4
        with:
          path: .tmp-obs-studio/build_x64
          key: ${{ runner.os }}-obs-sdk-32.0.4-x64-v1
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Check GPG Secret Keys (debug)
        shell: pwsh
        run: gpg --batch --list-secret-keys

      - name: Build OBS SDK (official script)
        shell: pwsh
        run: |
          $obsLibCached = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -File -Filter "obs.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $obsLibCached) {
            $env:CI = "true"
            pwsh -NoProfile -ExecutionPolicy Bypass -File .tmp-obs-studio/.github/scripts/Build-Windows.ps1 -Target x64 -Configuration Release
          } else {
            Write-Host "Using cached OBS SDK: $($obsLibCached.FullName)"
          }

          $obsInclude = (Resolve-Path ".tmp-obs-studio/libobs").Path
          $obsConfigHeader = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -Filter "obsconfig.h" | Select-Object -First 1
          $obsLib = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -File | Where-Object {
            $_.Name -eq "obs.lib" -and $_.FullName -notmatch "\\CMakeFiles\\"
          } | Select-Object -First 1

          if (-not $obsConfigHeader) { throw "obsconfig.h not found under .tmp-obs-studio/build_x64" }
          if (-not $obsLib) {
            Write-Host "Available .lib files under .tmp-obs-studio/build_x64:"
            Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -Filter "*.lib" | Select-Object -First 100 -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
            throw "obs.lib not found under .tmp-obs-studio/build_x64"
          }

          $obsGenerated = $obsConfigHeader.Directory.FullName
          $obsLibDir = $obsLib.Directory.FullName

          Write-Host "OBS include: $obsInclude"
          Write-Host "OBS generated include: $obsGenerated"
          Write-Host "OBS lib: $($obsLib.FullName)"

          "OBS_INCLUDE_DIR=$obsInclude" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBS_GENERATED_INCLUDE_DIR=$obsGenerated" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBS_LIB_DIR=$obsLibDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build native targets
        shell: pwsh
        run: ./scripts/build.ps1 -Config Release -ObsIncludeDir "$env:OBS_INCLUDE_DIR" -ObsGeneratedIncludeDir "$env:OBS_GENERATED_INCLUDE_DIR" -ObsLibDir "$env:OBS_LIB_DIR"

      - name: Prepare AOA test driver signing assets
        id: aoa_sign
        shell: pwsh
        env:
          AOA_TEST_CERT_PFX_BASE64: ${{ secrets.AOA_TEST_CERT_PFX_BASE64 }}
          AOA_TEST_CERT_PASSWORD: ${{ secrets.AOA_TEST_CERT_PASSWORD }}
          AOA_TEST_CERT_CER_BASE64: ${{ secrets.AOA_TEST_CERT_CER_BASE64 }}
        run: |
          $hasPfx = -not [string]::IsNullOrWhiteSpace($env:AOA_TEST_CERT_PFX_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:AOA_TEST_CERT_PASSWORD)
          if (-not ($hasPfx -and $hasPassword)) {
            "signed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "AOA driver signing skipped: missing AOA_TEST_CERT_PFX_BASE64 or AOA_TEST_CERT_PASSWORD."
            return
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "acb-aoa-test.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:AOA_TEST_CERT_PFX_BASE64))

          $cerArg = @()
          if (-not [string]::IsNullOrWhiteSpace($env:AOA_TEST_CERT_CER_BASE64)) {
            $cerPath = Join-Path $env:RUNNER_TEMP "acb-aoa-test.cer"
            [IO.File]::WriteAllBytes($cerPath, [Convert]::FromBase64String($env:AOA_TEST_CERT_CER_BASE64))
            $cerArg = @("-ExistingCerPath", $cerPath)
          }

          $args = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\sign-aoa-driver.ps1",
            "-ExistingPfxPath", $pfxPath,
            "-PfxPassword", $env:AOA_TEST_CERT_PASSWORD,
            "-InstallCertificate:`$false",
            "-UseMakeCatFallback"
          ) + $cerArg

          pwsh @args
          if ($LASTEXITCODE -ne 0) {
            throw "AOA driver signing failed."
          }

          "signed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Android debug APK
        shell: pwsh
        working-directory: ./android
        run: gradle :app:assembleDebug --no-daemon

      - name: Package payload (require real OBS plugin)
        shell: pwsh
        run: ./scripts/package.ps1 -Version "0.0.0-ci" -OutDir "./dist/acb-win-x64" -ObsIncludeDir "$env:OBS_INCLUDE_DIR" -ObsGeneratedIncludeDir "$env:OBS_GENERATED_INCLUDE_DIR" -ObsLibDir "$env:OBS_LIB_DIR" -RequireRealObsPlugin $true

      - name: Verify OBS plugin mode
        shell: pwsh
        run: |
          $pkg = Get-Content "dist/acb-win-x64/package.json" -Raw | ConvertFrom-Json
          if ($pkg.obsPluginBuildMode -ne "real") {
            throw "OBS plugin mode is '$($pkg.obsPluginBuildMode)' not 'real'."
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer from prepared payload
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version "0.0.0-ci" -SkipPackage


      - name: Validate payload files
        shell: pwsh
        run: |
          $required = @(
            "dist/acb-win-x64/package.json",
            "dist/acb-win-x64/receiver/acb-receiver.exe",
            "dist/acb-win-x64/virtualcam-bridge/acb-virtualcam-bridge.exe",
            "dist/acb-win-x64/virtualcam-driver/acb-virtualcam.dll",
            "dist/acb-win-x64/drivers/aoa-winusb/acb-aoa.inf",
            "dist/acb-win-x64/drivers/aoa-winusb/install-driver.ps1",
            "dist/acb-win-x64/prereqs/vc_redist.x64.exe"
          )
          if ("${{ steps.aoa_sign.outputs.signed }}" -eq "true") {
            $required += @(
              "dist/acb-win-x64/drivers/aoa-winusb/acb-aoa.cat",
              "dist/acb-win-x64/drivers/aoa-winusb/acb-aoa.cer"
            )
          }
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              Write-Host "Missing payload item: $item"
              if (Test-Path "dist/acb-win-x64") {
                Get-ChildItem "dist/acb-win-x64" -Recurse | Select-Object -First 200 FullName | ForEach-Object { Write-Host "  $($_.FullName)" }
              }
              throw "Payload validation failed."
            }
          }
          if (-not (Test-Path "dist/installer/ACB-Setup-0.0.0-ci.exe")) {
            throw "CI installer missing: dist/installer/ACB-Setup-0.0.0-ci.exe"
          }
      - name: Upload Windows payload
        uses: actions/upload-artifact@v4
        with:
          name: acb-win-x64-ci
          path: dist/acb-win-x64/**
          if-no-files-found: error

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: acb-installer-ci
          path: dist/installer/ACB-Setup-0.0.0-ci.exe
          if-no-files-found: error

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: acb-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error





