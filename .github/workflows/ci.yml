name: ci

on:
  push:
    branches: ["main", "master", "develop", "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout OBS Studio source
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: 32.0.4
          path: .tmp-obs-studio
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build OBS SDK (official script)
        shell: pwsh
        run: |
          $env:CI = "true"
          pwsh -NoProfile -ExecutionPolicy Bypass -File .tmp-obs-studio/.github/scripts/Build-Windows.ps1 -Target x64 -Configuration Release

          $obsInclude = (Resolve-Path ".tmp-obs-studio/libobs").Path
          $obsConfigHeader = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -Filter "obsconfig.h" | Select-Object -First 1
          $obsLib = Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -File | Where-Object {
            $_.Name -eq "obs.lib" -and $_.FullName -notmatch "\\CMakeFiles\\"
          } | Select-Object -First 1

          if (-not $obsConfigHeader) { throw "obsconfig.h not found under .tmp-obs-studio/build_x64" }
          if (-not $obsLib) {
            Write-Host "Available .lib files under .tmp-obs-studio/build_x64:"
            Get-ChildItem ".tmp-obs-studio/build_x64" -Recurse -Filter "*.lib" | Select-Object -First 100 -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
            throw "obs.lib not found under .tmp-obs-studio/build_x64"
          }

          $obsGenerated = $obsConfigHeader.Directory.FullName
          $obsLibDir = $obsLib.Directory.FullName

          Write-Host "OBS include: $obsInclude"
          Write-Host "OBS generated include: $obsGenerated"
          Write-Host "OBS lib: $($obsLib.FullName)"

          "OBS_INCLUDE_DIR=$obsInclude" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBS_GENERATED_INCLUDE_DIR=$obsGenerated" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBS_LIB_DIR=$obsLibDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build native targets
        shell: pwsh
        run: ./scripts/build.ps1 -Config Release -ObsIncludeDir "$env:OBS_INCLUDE_DIR" -ObsGeneratedIncludeDir "$env:OBS_GENERATED_INCLUDE_DIR" -ObsLibDir "$env:OBS_LIB_DIR"

      - name: Build Android debug APK
        shell: pwsh
        working-directory: ./android
        run: gradle :app:assembleDebug --no-daemon

      - name: Package payload (require real OBS plugin)
        shell: pwsh
        run: ./scripts/package.ps1 -Version "0.0.0-ci" -OutDir "./dist/acb-win-x64" -ObsIncludeDir "$env:OBS_INCLUDE_DIR" -ObsGeneratedIncludeDir "$env:OBS_GENERATED_INCLUDE_DIR" -ObsLibDir "$env:OBS_LIB_DIR" -RequireRealObsPlugin $true

      - name: Verify OBS plugin mode
        shell: pwsh
        run: |
          $pkg = Get-Content "dist/acb-win-x64/package.json" -Raw | ConvertFrom-Json
          if ($pkg.obsPluginBuildMode -ne "real") {
            throw "OBS plugin mode is '$($pkg.obsPluginBuildMode)' not 'real'."
          }

      - name: Upload Windows payload
        uses: actions/upload-artifact@v4
        with:
          name: acb-win-x64-ci
          path: dist/acb-win-x64/**
          if-no-files-found: error

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: acb-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

