name: ci

on:
  push:
    branches: ["main", "master", "develop", "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build native targets
        shell: pwsh
        run: ./scripts/build.ps1 -Config Release

      - name: Build Android debug APK
        shell: pwsh
        working-directory: ./android
        run: gradle :app:assembleDebug --no-daemon

      - name: Package payload
        shell: pwsh
        run: ./scripts/package.ps1 -Version "0.0.0-ci" -OutDir "./dist/acb-win-x64"

      - name: Upload Windows payload
        uses: actions/upload-artifact@v4
        with:
          name: acb-win-x64-ci
          path: dist/acb-win-x64/**
          if-no-files-found: error

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: acb-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
